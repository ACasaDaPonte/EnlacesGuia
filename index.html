  body {
    font-family: Arial, sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    padding: 24px 16px 60px;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
  }

  .logo {

    height: auto;
  }

  h1 {

  .subtitulo {

    color: #718096;
    text-align: center;
    max-width: 480px;
    margin: 0 auto 28px;
    line-height: 1.5;
  }

  .categoria {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
  }

  .cabecera-cat {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #1a202c;
    background: #f7fafc;
  }

  .cabecera-cat .icono { color: #718096; font-size: 12px; transition: transform 0.15s ease; }
  .categoria.abierta .icono { transform: rotate(180deg); }

  .lista {
    display: none;
    padding: 6px 10px 10px;
  }

  .categoria.abierta .lista { display: block; }

  .item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 10px 10px;
    border-bottom: 1px solid #edf2f7;
  }

  .item:last-child { border-bottom: none; }

  .info-item {
    min-width: 0;
  }

  .nombre-item {
    font-size: 14px;
    color: #2d3748;
    font-weight: 600;
    line-height: 1.3;
  }

  .lugar-item {
    font-size: 11.5px;
    color: #a0aec0;
  }

  .btn-ir {
    flex-shrink: 0;
    display: inline-block;
    background: #2980b9;
    color: #ffffff;
    text-decoration: none;
    font-size: 12.5px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 6px;
    white-space: nowrap;
  }

  .btn-ir:hover { background: #21618c; }

  .selector-idioma {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 18px;
  }

  .btn-idioma {
    border: 1px solid #cbd5e0;
    background: #ffffff;
    color: #4a5568;
    font-size: 12.5px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
  }

  .btn-idioma.activo {
    background: #2980b9;
    border-color: #2980b9;
    color: #ffffff;
  }

  footer {
    text-align: center;
    font-size: 11px;
    color: #a0aec0;
    margin-top: 24px;
  }
</style>

const TRADUCCIONES = {
  es: {
    titulo: "Enlaces · A Casa da Ponte",
    h1: "Enlaces de la Guía",
    subtitulo: "Todos los enlaces de los códigos QR de la guía de A Casa da Ponte, en un solo sitio. Toca una categoría para desplegarla.",
    btnIr: "Ir",
    palabraRuta: "Ruta",
    categorias: {
      rutasCoche: "Rutas en coche",
      rutasPie: "Rutas a pie",
      desayunar: "Desayunar",
      comerBeber: "Comer y beber",
      comprar: "Comprar",
      salud: "Salud",
      otros: "Otros"
    }
  },
  gl: {
    titulo: "Ligazóns · A Casa da Ponte",
    h1: "Ligazóns da Guía",
    subtitulo: "Todas as ligazóns dos códigos QR da guía de A Casa da Ponte, nun só sitio. Toca unha categoría para despregala.",
    btnIr: "Ir",
    palabraRuta: "Ruta",
    categorias: {
      rutasCoche: "Rutas en coche",
      rutasPie: "Rutas a pé",
      desayunar: "Almorzar",
      comerBeber: "Comer e beber",
      comprar: "Mercar",
      salud: "Saúde",
      otros: "Outros"
    }
  },
  en: {
    titulo: "Links · A Casa da Ponte",
    h1: "Guide Links",
    subtitulo: "All the links from A Casa da Ponte's guide QR codes, in one place. Tap a category to expand it.",
    btnIr: "Go",
    palabraRuta: "Route",
    categorias: {
      rutasCoche: "Driving routes",
      rutasPie: "Walking routes",
      desayunar: "Breakfast",
      comerBeber: "Eating & drinking",
      comprar: "Shopping",
      salud: "Health",
      otros: "Other"
    }
  }
};

const cont = document.getElementById('acordeon');
let idiomaActual = 'es';

function renderizar(idioma) {
  const t = TRADUCCIONES[idioma];

  document.title = t.titulo;
  document.getElementById('titulo-h1').textContent = t.h1;
  document.getElementById('texto-subtitulo').textContent = t.subtitulo;

  document.querySelectorAll('.btn-idioma').forEach(btn => {
    btn.classList.toggle('activo', btn.dataset.lang === idioma);
  });

  // Guardamos qué categorías estaban abiertas para conservarlo al cambiar de idioma
  const abiertas = Array.from(cont.querySelectorAll('.categoria')).map(c => c.classList.contains('abierta'));

  cont.innerHTML = '';

  DATOS.forEach((cat, idx) => {
    const div = document.createElement('div');
    div.className = 'categoria';
    if (abiertas.length ? abiertas[idx] : idx === 0) div.classList.add('abierta');

    const esCategoriaDeRutas = cat.key === 'rutasCoche' || cat.key === 'rutasPie';

    const itemsHtml = cat.items.map(it => {
      const nombreMostrado = esCategoriaDeRutas
        ? it.n.replace(/^Ruta\b/, t.palabraRuta)
        : it.n;
      return `
      <div class="item">
        <div class="info-item">
          <div class="nombre-item">${nombreMostrado}</div>
          ${it.g ? `<div class="lugar-item">${it.g}</div>` : ''}
        </div>
        <a class="btn-ir" href="${it.l}" target="_blank" rel="noopener">${t.btnIr}</a>
      </div>
    `;
    }).join('');

    div.innerHTML = `
      <div class="cabecera-cat">
        <span>${t.categorias[cat.key]}</span>
        <span class="icono">▼</span>
      </div>
      <div class="lista">${itemsHtml}</div>
    `;

    div.querySelector('.cabecera-cat').addEventListener('click', () => {
      div.classList.toggle('abierta');
    });

    cont.appendChild(div);
  });
}

document.querySelectorAll('.btn-idioma').forEach(btn => {
  btn.addEventListener('click', () => {
    idiomaActual = btn.dataset.lang;
    renderizar(idiomaActual);
  });
});

renderizar(idiomaActual);

</script>
